services:
  - type: web
    name: desktop-organizer-api
    runtime: python
    buildCommand: pip install -r requirements-server.txt
    startCommand: gunicorn server:app
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: RATE_LIMIT
        value: "10"
      - key: RATE_WINDOW
        value: "3600"
